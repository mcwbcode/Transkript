<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transkript — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.13);
      --text: #111111;
      --text-2: #555555;
      --text-3: #999999;
      --red: #e5383b;
      --red-dark: #c0292c;
      --red-light: #fff1f1;
      --green: #22c55e;
      --green-light: #f0fdf4;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --blue: #3b82f6;
      --blue-light: #eff6ff;
      --purple: #8b5cf6;
      --purple-light: #faf5ff;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 9999px;
      --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1300px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 12px; }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-weight: 800; font-size: 16px; }
    .logo-mark { width: 28px; height: 28px; background: var(--red); border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-mark svg { width: 15px; height: 15px; fill: white; }
    .nav-badge { display: inline-flex; background: rgba(229,56,59,0.1); color: var(--red); border-radius: var(--radius-pill); padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-pill);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; text-decoration: none;
      transition: all var(--transition); white-space: nowrap; line-height: 1;
    }
    .btn-ghost { background: transparent; color: var(--text-2); }
    .btn-ghost:hover { background: rgba(0,0,0,0.05); color: var(--text); }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: var(--red-dark); }
    .btn-dark { background: #111; color: #fff; }
    .btn-dark:hover { background: #333; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border-strong); color: var(--text); }
    .btn-outline:hover { background: rgba(0,0,0,0.04); }
    .btn-save { background: #111; color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12.5px; }
    .btn-save:hover { background: #333; }
    .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    .btn-save.saving { opacity: .7; cursor: not-allowed; }

    /* LOGIN SCREEN */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }
    .login-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .login-header { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
    .login-header span { font-weight: 800; font-size: 18px; }
    .login-subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 10px 13px; border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm); font-family: var(--font); font-size: 14px;
      color: var(--text); outline: none; transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(229,56,59,.1); }
    .form-input::placeholder { color: var(--text-3); }
    .login-btn { width: 100%; font-size: 14px; padding: 12px; border-radius: 8px; margin-top: 4px; }
    .alert { padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.show { display: block; }
    .alert-error { background: var(--red-light); color: #b91c1c; border: 1px solid rgba(229,56,59,.18); }
    .alert-success { background: var(--green-light); color: #15803d; border: 1px solid rgba(34,197,94,.22); }

    /* ADMIN CONTENT */
    .admin-content { display: none; }
    .admin-content.visible { display: block; }
    .page { max-width: 1300px; margin: 0 auto; padding: 28px 24px 60px; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    @media (max-width: 860px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 20px 22px; }
    .stat-icon { font-size: 20px; margin-bottom: 10px; }
    .stat-num { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12.5px; color: var(--text-3); font-weight: 500; }
    .stat-card.s-blue { border-top: 3px solid var(--blue); }
    .stat-card.s-green { border-top: 3px solid var(--green); }
    .stat-card.s-purple { border-top: 3px solid var(--purple); }
    .stat-card.s-amber { border-top: 3px solid var(--amber); }

    /* TABLE SECTION */
    .table-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .table-title { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; }
    .table-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .search-input {
      padding: 8px 14px; border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-pill); font-family: var(--font); font-size: 13px;
      color: var(--text); outline: none; transition: border-color var(--transition);
      width: 240px;
    }
    .search-input:focus { border-color: var(--red); }
    .search-input::placeholder { color: var(--text-3); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: var(--bg); }
    th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,0,0,0.015); }
    .user-email { font-weight: 600; font-size: 13px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-date { font-size: 12px; color: var(--text-3); }

    /* PLAN SELECT */
    .plan-select {
      padding: 5px 8px; border: 1.5px solid var(--border-strong);
      border-radius: 6px; font-family: var(--font); font-size: 12.5px;
      font-weight: 600; color: var(--text); background: #fff; cursor: pointer;
      outline: none; transition: border-color var(--transition);
    }
    .plan-select:focus { border-color: var(--red); }
    .plan-select.plan-free    { color: var(--text-2); }
    .plan-select.plan-beta    { color: var(--purple); }
    .plan-select.plan-pro     { color: #a16207; }
    .plan-select.plan-expired { color: var(--red); }

    /* EXPIRY INPUT */
    .expiry-wrap { display: flex; align-items: center; gap: 6px; }
    .expiry-input {
      padding: 5px 8px; border: 1.5px solid var(--border-strong);
      border-radius: 6px; font-family: var(--font); font-size: 12px; color: var(--text);
      outline: none; transition: border-color var(--transition); width: 130px;
    }
    .expiry-input:focus { border-color: var(--red); }
    .expiry-input:disabled { opacity: .4; cursor: not-allowed; }
    .unlimited-label { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-2); cursor: pointer; white-space: nowrap; }
    .unlimited-label input { cursor: pointer; accent-color: var(--red); }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: #111; color: #fff; border-radius: 10px; padding: 12px 18px;
      font-size: 13.5px; font-weight: 500; max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: toast-in 200ms ease;
    }
    .toast.success { background: #111; border-left: 3px solid var(--green); }
    .toast.error   { background: #111; border-left: 3px solid var(--red); }
    @keyframes toast-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-3); }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    /* LOADING */
    .table-loading { text-align: center; padding: 48px; }
    .loading-spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-btn { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .search-input { width: 100%; }
      .page { padding: 20px 16px 48px; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
          <rect x="1.5" y="4" width="2" height="8" rx="1"/>
          <rect x="5" y="1.5" width="2" height="13" rx="1"/>
          <rect x="8.5" y="5" width="2" height="6" rx="1"/>
          <rect x="12" y="2.5" width="2" height="11" rx="1"/>
        </svg>
      </div>
      <span>Transkript</span>
    </div>
    <div class="login-subtitle">Connexion à l'espace administrateur</div>
    <div id="loginAlert" class="alert"></div>
    <form onsubmit="adminLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email administrateur</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="admin@exemple.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">Mot de passe</label>
        <input class="form-input" type="password" id="loginPass" placeholder="••••••••" required minlength="6" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-dark login-btn" id="loginBtn">Se connecter</button>
    </form>
  </div>
</div>

<!-- ADMIN CONTENT -->
<div class="admin-content" id="adminContent">

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <div style="display:flex;align-items:center;gap:10px">
        <a href="index.html" class="nav-logo">
          <div class="logo-mark">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
              <rect x="1.5" y="4" width="2" height="8" rx="1"/>
              <rect x="5" y="1.5" width="2" height="13" rx="1"/>
              <rect x="8.5" y="5" width="2" height="6" rx="1"/>
              <rect x="12" y="2.5" width="2" height="11" rx="1"/>
            </svg>
          </div>
          Transkript
        </a>
        <span class="nav-badge">Administration</span>
      </div>
      <button class="btn btn-ghost" onclick="adminLogout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Déconnexion
      </button>
    </div>
  </nav>

  <div class="page">

    <!-- STATS -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card s-blue">
        <div class="stat-icon">👥</div>
        <div class="stat-num" id="statTotal">—</div>
        <div class="stat-label">Utilisateurs total</div>
      </div>
      <div class="stat-card s-green">
        <div class="stat-icon">🆓</div>
        <div class="stat-num" id="statFree">—</div>
        <div class="stat-label">Plan Gratuit</div>
      </div>
      <div class="stat-card s-purple">
        <div class="stat-icon">🧪</div>
        <div class="stat-num" id="statBeta">—</div>
        <div class="stat-label">Plan Bêta</div>
      </div>
      <div class="stat-card s-amber">
        <div class="stat-icon">⭐</div>
        <div class="stat-num" id="statPro">—</div>
        <div class="stat-label">Plan Pro</div>
      </div>
    </div>

    <!-- USER TABLE -->
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">Utilisateurs</div>
        <div class="table-actions">
          <input class="search-input" type="text" id="searchInput" placeholder="Rechercher un email…" oninput="filterUsers()">
          <button class="btn btn-outline" onclick="loadUsers()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Actualiser
          </button>
        </div>
      </div>

      <div id="tableLoading" class="table-loading">
        <div class="loading-spinner"></div>
      </div>

      <div class="table-wrap hidden" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Plan</th>
              <th>Expiration</th>
              <th>Dernière connexion</th>
              <th>Version app</th>
              <th>Inscrit le</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
        <div class="empty-state hidden" id="emptyState">
          <span style="font-size:32px">🔍</span>
          <p>Aucun utilisateur trouvé.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const { createClient } = window.supabase;
const sb = createClient(
  'https://gotfmgkrjqxzhrlagscj.supabase.co',
  'sb_publishable_6ihonkWVKPbA-jeTcp5QBw_QU1fVcI5'
);

let allUsers = [];
let currentSession = null;

function fmt(str) {
  if (!str) return '—';
  try { return new Date(str).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }); }
  catch { return '—'; }
}
function fmtDate(str) {
  if (!str) return '—';
  try { return new Date(str).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' }); }
  catch { return '—'; }
}

// Toast
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type === 'success' ? '✓  ' : '✗  ') + msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Login
async function adminLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const alertEl = document.getElementById('loginAlert');
  alertEl.className = 'alert';

  btn.disabled = true;
  btn.textContent = 'Connexion…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    alertEl.textContent = 'Email ou mot de passe incorrect.';
    alertEl.className = 'alert show alert-error';
    btn.disabled = false;
    btn.textContent = 'Se connecter';
    return;
  }
  currentSession = data.session;
  showAdmin();
}

async function adminLogout() {
  await sb.auth.signOut();
  document.getElementById('adminContent').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  currentSession = null;
  allUsers = [];
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminContent').classList.add('visible');
  loadUsers();
}

// Load users
async function loadUsers() {
  document.getElementById('tableLoading').style.display = 'block';
  document.getElementById('tableWrap').classList.add('hidden');

  try {
    const { data, error } = await sb.rpc('admin_list_users');
    if (error) throw error;
    allUsers = data || [];
    updateStats();
    renderTable(allUsers);
  } catch (err) {
    toast('Erreur lors du chargement : ' + (err.message || 'inconnue'), 'error');
    document.getElementById('tableLoading').style.display = 'none';
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allUsers.length;
  document.getElementById('statFree').textContent = allUsers.filter(u => (u.plan || 'free') === 'free').length;
  document.getElementById('statBeta').textContent = allUsers.filter(u => u.plan === 'beta').length;
  document.getElementById('statPro').textContent = allUsers.filter(u => u.plan === 'pro').length;
}

function renderTable(users) {
  document.getElementById('tableLoading').style.display = 'none';
  document.getElementById('tableWrap').classList.remove('hidden');
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '';

  if (!users.length) {
    document.getElementById('emptyState').classList.remove('hidden');
    return;
  }
  document.getElementById('emptyState').classList.add('hidden');

  users.forEach(u => {
    const uid = u.user_id || u.id || '';
    const plan = u.plan || 'free';
    const unlimited = !u.valid_until;
    const expiryVal = u.valid_until ? u.valid_until.split('T')[0] : '';

    const tr = document.createElement('tr');
    tr.dataset.userId = uid;
    tr.innerHTML = `
      <td>
        <div class="user-email" title="${u.email}">${u.email}</div>
        ${uid ? `<div class="user-date">ID: ${uid.slice(0,8)}…</div>` : ''}
      </td>
      <td>
        <select class="plan-select plan-${plan}" onchange="onPlanChange(this)">
          <option value="free"     ${plan==='free'    ?'selected':''}>Gratuit</option>
          <option value="beta"     ${plan==='beta'    ?'selected':''}>Bêta</option>
          <option value="pro"      ${plan==='pro'     ?'selected':''}>Pro</option>
          <option value="expired"  ${plan==='expired' ?'selected':''}>Expiré</option>
        </select>
      </td>
      <td>
        <div class="expiry-wrap">
          <input type="date" class="expiry-input" value="${expiryVal}" ${unlimited?'disabled':''}>
          <label class="unlimited-label">
            <input type="checkbox" ${unlimited?'checked':''} onchange="toggleUnlimited(this)">
            Illimité
          </label>
        </div>
      </td>
      <td><span class="user-date">${fmt(u.last_login)}</span></td>
      <td><span class="user-date">${u.app_version || '—'}</span></td>
      <td><span class="user-date">${fmtDate(u.created_at)}</span></td>
      <td>
        <button class="btn btn-save" onclick="saveUser(this)">Enregistrer</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function onPlanChange(select) {
  select.className = `plan-select plan-${select.value}`;
}

function toggleUnlimited(checkbox) {
  const input = checkbox.closest('.expiry-wrap').querySelector('.expiry-input');
  input.disabled = checkbox.checked;
  if (checkbox.checked) input.value = '';
}

function filterUsers() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = q ? allUsers.filter(u => u.email.toLowerCase().includes(q)) : allUsers;
  renderTable(filtered);
}

async function saveUser(btn) {
  const tr = btn.closest('tr');
  const userId = tr.dataset.userId;
  const plan = tr.querySelector('.plan-select').value;
  const unlimited = tr.querySelector('input[type=checkbox]').checked;
  const expiryInput = tr.querySelector('.expiry-input').value;
  const validUntil = unlimited ? null : (expiryInput ? new Date(expiryInput).toISOString() : null);

  btn.disabled = true;
  btn.textContent = '…';

  try {
    const { error } = await sb.rpc('admin_set_plan', {
      target_user_id: userId,
      new_plan: plan,
      new_valid_until: validUntil
    });
    if (error) throw error;
    toast('Plan mis à jour avec succès.', 'success');
    // Update local data
    const u = allUsers.find(x => (x.user_id || x.id) === userId);
    if (u) { u.plan = plan; u.valid_until = validUntil; }
    updateStats();
  } catch (err) {
    toast('Erreur : ' + (err.message || 'inconnue'), 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Enregistrer';
}

// Auto-detect existing session on load
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentSession = session;
    showAdmin();
  }
})();
</script>
</body>
</html>
