<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transkript — Créer un compte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text: #111111;
      --text-2: #555555;
      --text-3: #999999;
      --red: #e5383b;
      --red-dark: #c0292c;
      --red-light: #fff1f1;
      --green: #22c55e;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-pill: 9999px;
      --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font); background: var(--bg);
      color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
    }

    /* LOGO */
    .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text);
      font-weight: 800; font-size: 18px; margin-bottom: 32px;
    }
    .logo-mark {
      width: 32px; height: 32px; background: var(--red); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 18px; height: 18px; fill: white; }

    /* CARD */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-xl); padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    /* TABS */
    .auth-tabs { display: flex; background: rgba(0,0,0,0.04); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; padding: 8px 14px; border-radius: 7px; border: none;
      background: transparent; font-family: var(--font); font-size: 13.5px; font-weight: 600;
      color: var(--text-2); cursor: pointer; transition: all var(--transition);
    }
    .auth-tab.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    /* FORM */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 11px 13px; border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm); font-family: var(--font); font-size: 14.5px;
      color: var(--text); background: #fff; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(229,56,59,.1); }
    .form-input::placeholder { color: var(--text-3); }
    .confirm-wrap { display: none; }
    .btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 13px; border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 15px; font-weight: 700;
      cursor: pointer; border: none; background: #111; color: #fff;
      transition: all var(--transition); margin-top: 6px;
    }
    .btn:hover { background: #333; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ALERTS */
    .alert { padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13.5px; margin-bottom: 14px; display: none; }
    .alert.show { display: block; }
    .alert-error { background: var(--red-light); color: #b91c1c; border: 1px solid rgba(229,56,59,.18); }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid rgba(34,197,94,.22); }

    /* FOOTER LINK */
    .card-foot { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-3); }
    .card-foot a { color: var(--red); text-decoration: none; font-weight: 600; }
    .card-foot a:hover { text-decoration: underline; }

    /* SUCCESS SCREEN */
    .success-screen { display: none; text-align: center; }
    .success-screen.show { display: block; }
    .success-icon {
      width: 64px; height: 64px; background: #f0fdf4; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 30px;
    }
    .success-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
    .success-desc { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
    .btn-goto {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 28px; border-radius: var(--radius-pill);
      background: var(--red); color: #fff; text-decoration: none;
      font-family: var(--font); font-size: 14px; font-weight: 700;
      transition: all var(--transition);
    }
    .btn-goto:hover { background: var(--red-dark); transform: translateY(-1px); }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }

    /* HOME LINK */
    .home-link { margin-top: 20px; font-size: 13px; color: var(--text-3); text-align: center; }
    .home-link a { color: var(--text-2); text-decoration: none; }
    .home-link a:hover { color: var(--text); text-decoration: underline; }
  </style>
</head>
<body>

  <a href="index.html" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="4" width="2" height="8" rx="1"/>
        <rect x="5" y="1.5" width="2" height="13" rx="1"/>
        <rect x="8.5" y="5" width="2" height="6" rx="1"/>
        <rect x="12" y="2.5" width="2" height="11" rx="1"/>
      </svg>
    </div>
    Transkript
  </a>

  <!-- AUTH FORM -->
  <div class="card" id="authCard">
    <div class="auth-tabs">
      <button class="auth-tab" id="tab-login" onclick="switchTab('login')">Se connecter</button>
      <button class="auth-tab active" id="tab-signup" onclick="switchTab('signup')">Créer un compte</button>
    </div>

    <div id="alertMsg" class="alert"></div>

    <form onsubmit="handleAuth(event)">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group confirm-wrap" id="confirmWrap">
        <label class="form-label" for="confirm">Confirmer le mot de passe</label>
        <input class="form-input" type="password" id="confirm" placeholder="••••••••" minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Créer un compte</button>
    </form>

    <div class="card-foot">
      <span id="footText">Déjà un compte ? </span>
      <a href="#" id="footLink" onclick="switchTabLink(event)">Se connecter</a>
    </div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div class="card" id="successCard" style="display:none">
    <div class="success-screen show">
      <div class="success-icon">✉️</div>
      <div class="success-title" id="successTitle">Vérifiez votre email</div>
      <div class="success-desc" id="successDesc">
        Un lien de confirmation a été envoyé à votre adresse email. Cliquez dessus pour activer votre compte Transkript.
      </div>
      <a href="dashboard.html" class="btn-goto">Accéder au dashboard</a>
    </div>
  </div>

  <div class="home-link">
    <a href="index.html">← Retour à l'accueil</a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const { createClient } = window.supabase;
const sb = createClient(
  'https://gotfmgkrjqxzhrlagscj.supabase.co',
  'sb_publishable_6ihonkWVKPbA-jeTcp5QBw_QU1fVcI5'
);

let currentTab = 'signup';

// Redirect if already logged in
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('confirmWrap').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('confirm').required = tab === 'signup';
  document.getElementById('submitBtn').textContent = tab === 'login' ? 'Se connecter' : 'Créer un compte';
  document.getElementById('footText').textContent = tab === 'login' ? 'Pas encore de compte ? ' : 'Déjà un compte ? ';
  document.getElementById('footLink').textContent = tab === 'login' ? 'Créer un compte' : 'Se connecter';
  clearAlert();
}

function switchTabLink(e) {
  e.preventDefault();
  switchTab(currentTab === 'login' ? 'signup' : 'login');
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertMsg');
  el.textContent = msg;
  el.className = `alert show alert-${type}`;
}
function clearAlert() { document.getElementById('alertMsg').className = 'alert'; }

const ERR = {
  'Invalid login credentials': 'Email ou mot de passe incorrect.',
  'Email not confirmed': 'Veuillez confirmer votre email avant de vous connecter.',
  'User already registered': 'Un compte avec cet email existe déjà.',
  'Password should be at least 6 characters': 'Le mot de passe doit faire au moins 6 caractères.',
};

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const btn = document.getElementById('submitBtn');
  clearAlert();

  if (currentTab === 'signup') {
    if (password.length < 6) { showAlert('Le mot de passe doit faire au moins 6 caractères.'); return; }
    if (password !== confirm) { showAlert('Les mots de passe ne correspondent pas.'); return; }
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    if (currentTab === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      window.location.href = 'dashboard.html';
    } else {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;

      if (data.session || data.user?.email_confirmed_at) {
        window.location.href = 'dashboard.html';
      } else {
        // Show success screen
        document.getElementById('authCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
        document.getElementById('successTitle').textContent = 'Vérifiez votre email';
        document.getElementById('successDesc').textContent =
          `Un lien de confirmation a été envoyé à ${email}. Cliquez dessus pour activer votre compte Transkript.`;
      }
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = currentTab === 'login' ? 'Se connecter' : 'Créer un compte';
    showAlert(ERR[err.message] || err.message || 'Une erreur est survenue. Réessayez.');
  }
}

// Show confirm field for signup by default
document.getElementById('confirmWrap').style.display = 'block';
document.getElementById('confirm').required = true;
</script>
</body>
</html>
